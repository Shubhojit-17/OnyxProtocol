services:
  postgres:
    image: postgres:16-alpine
    container_name: onyx-postgres
    environment:
      POSTGRES_USER: onyx
      POSTGRES_PASSWORD: onyx
      POSTGRES_DB: onyx_protocol
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U onyx"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
